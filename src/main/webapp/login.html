<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Glassmorphism Login</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: 'Poppins', sans-serif;
}

body {
	min-height: 100vh;
	background: #111827;
}

.login-container {
	display: flex;
	min-height: 100vh;
}

.left-panel {
	flex: 1;
	background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
		url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1400');
	background-size: cover;
	background-position: center;
	display: flex;
	align-items: center;
	justify-content: center;
	color: white;
}

.overlay {
	text-align: center;
	padding: 40px;
}

.overlay h1 {
	font-size: 60px;
	color: #ff6b35;
	margin-bottom: 20px;
}

.overlay p {
	font-size: 20px;
	line-height: 1.8;
	max-width: 500px;
}

.right-panel {
	flex: 1;
	display: flex;
	justify-content: center;
	align-items: center;
	background: #0f172a;
}

.login-card {
	width: 450px;
	background: #1e293b;
	padding: 45px;
	border-radius: 20px;
	box-shadow: 0 10px 30px rgba(0, 0, 0, .4);
}

.login-card h2 {
	font-size: 32px;
	color: white;
	margin-bottom: 10px;
}

.subtitle {
	color: #cbd5e1;
	margin-bottom: 30px;
}

.input-group {
	margin-bottom: 20px;
}

.input-group label {
	display: block;
	margin-bottom: 8px;
	color: white;
}

.input-group input {
	width: 100%;
	padding: 14px;
	border: none;
	border-radius: 10px;
	background: #334155;
	color: white;
	outline: none;
}

.input-group input:focus {
	border: 2px solid #ff6b35;
}

.options {
	display: flex;
	justify-content: space-between;
	margin-bottom: 25px;
	color: white;
	font-size: 14px;
}

.options a {
	text-decoration: none;
	color: #ff6b35;
}

.login-btn {
	width: 100%;
	padding: 15px;
	border: none;
	border-radius: 10px;
	background: #ff6b35;
	color: white;
	font-size: 17px;
	font-weight: 600;
	cursor: pointer;
	transition: .3s;
}

.login-btn:hover {
	background: #ff5722;
}

.register-link {
	text-align: center;
	margin-top: 25px;
	color: #cbd5e1;
}

.register-link a {
	color: #ff6b35;
	text-decoration: none;
	font-weight: bold;
}

@media ( max-width :900px) {
	.login-container {
		flex-direction: column;
	}
	.left-panel {
		height: 250px;
	}
	.login-card {
		width: 90%;
		margin: 30px 0;
	}
	.overlay h1 {
		font-size: 40px;
	}
}
.password-box{

    position:relative;

}

.password-box input{

    width:100%;

    padding:14px 45px 14px 14px;

}

.password-toggle{

    position:absolute;

    right:16px;

    top:50%;

    transform:translateY(-50%);

    color:#cbd5e1;

    cursor:pointer;

    transition:.3s;

}

.password-toggle:hover{

    color:#ff6b35;

}
</style>

</head>
<body>

	<div class="login-container">

		<!-- Left Side -->

		<div class="left-panel">

			<div class="overlay">

				<h1>FoodieHub</h1>

				<p>Delicious food from your favorite restaurants, delivered to
					your doorstep in minutes.</p>

			</div>

		</div>

		<!-- Right Side -->

		<div class="right-panel">

			<div class="login-card">

				<h2>Welcome Back</h2>

				<p class="subtitle">Login to continue ordering your favorite
					meals</p>

				<form action="login" method="post">

					<div class="input-group">

						<label>Email Address</label> <input type="email" name="email"
							placeholder="Enter your email" required>

					</div>

					<div class="input-group">

    <label>Password</label>

    <div class="password-box">

        <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required>

        <i
            class="fa-solid fa-eye password-toggle"
            onclick="togglePassword('password',this)">
        </i>

    </div>

</div>

					<div class="options">

						<label> <input type="checkbox"> Remember Me
						</label> <a href="#"> Forgot Password? </a>

					</div>

					<button type="submit" class="login-btn">Login</button>

				</form>

				<div class="register-link">

					Don't have an account? <a href="register.html"> Create Account

					</a>

				</div>

			</div>

		</div>

	</div>

</body>
<script>
	function togglePassword(inputId, icon) {

		const input = document.getElementById(inputId);

		if (input.type === "password") {
			input.type = "text";
			icon.classList.remove("fa-eye");
			icon.classList.add("fa-eye-slash");
		} else {
			input.type = "password";
			icon.classList.remove("fa-eye-slash");
			icon.classList.add("fa-eye");
		}

	}
</script>
</html>
