<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodieHub - Register</title>
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
	rel="stylesheet">
<link
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
	rel="stylesheet">
<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: Poppins, sans-serif
}

body {
	min-height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	padding: 40px;
	background: linear-gradient(rgba(0, 0, 0, .65), rgba(0, 0, 0, .65)),
		url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1600");
	background-size: cover;
	background-position: center;
	background-attachment: fixed;
	overflow-y: auto;
}

.container {
	width: 100%;
	max-width: 1100px;
	display: grid;
	grid-template-columns: 1fr 1fr;
	background: rgba(255, 255, 255, .08);
	backdrop-filter: blur(18px);
	border-radius: 24px;
	overflow: hidden;
	border: 1px solid rgba(255, 255, 255, .15);
	box-shadow: 0 15px 40px rgba(0, 0, 0, .45);
}

.left {
	padding: 60px;
	background: linear-gradient(135deg, #ff6b35, #ff914d);
	color: #fff;
	display: flex;
	flex-direction: column;
	justify-content: center;
}

.left h1 {
	font-size: 52px;
	margin-bottom: 20px
}

.left p {
	line-height: 1.8;
	margin-bottom: 30px
}

.feature {
	margin: 12px 0;
	font-size: 18px
}

.right {
	padding: 50px;
	background: rgba(20, 20, 20, .45)
}

.logo {
	text-align: center;
	color: #ff7b3d;
	font-size: 42px;
	font-weight: 700;
	margin-bottom: 10px
}

.subtitle {
	text-align: center;
	color: #ddd;
	margin-bottom: 30px
}

.group {
	margin-bottom: 18px
}

.group label {
	display: block;
	color: #fff;
	margin-bottom: 8px
}

.input-box {
	position: relative
}

.input-box > i:not(.password-toggle) {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #bbb;
}
.input-box input,
.input-box textarea{
    width:100%;
    padding:14px 50px 14px 48px;   /* Left 48px, Right 50px */
    border-radius:12px;
    border:1px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.08);
    color:#fff;
    outline:none;
    font-size:15px;
}

textarea {
	height: 90px;
	resize: none;
	padding-top: 14px !important
}

input::placeholder, textarea::placeholder {
	color: #bbb
}

input:focus, textarea:focus {
	border-color: #ff6b35;
	box-shadow: 0 0 10px rgba(255, 107, 53, .45);
}

.password-toggle {
    position: absolute;
    left: auto;          /* IMPORTANT */
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: #bbb;
    cursor: pointer;
    z-index: 10;
}

button {
	width: 100%;
	padding: 15px;
	border: none;
	border-radius: 12px;
	background: linear-gradient(135deg, #ff6b35, #ff914d);
	color: #fff;
	font-size: 17px;
	font-weight: 600;
	cursor: pointer;
	transition: .3s;
}

button:hover {
	transform: translateY(-2px);
	box-shadow: 0 8px 20px rgba(255, 107, 53, .45);
}

.login {
	text-align: center;
	margin-top: 20px;
	color: #ddd;
}

.login a {
	color: #ff914d;
	font-weight: 600;
	text-decoration: none;
}

.error {
	color: #ff9a9a;
	font-size: 13px;
	margin-top: 8px;
	display: none;
}

@media ( max-width :900px) {
	.container {
		grid-template-columns: 1fr
	}
	.left {
		display: none
	}
	.right {
		padding: 35px
	}
}
</style>
</head>
<body>

	<div class="container">

		<div class="left">
			<h1>🍔 FoodieHub</h1>
			<p>Create your account and start ordering delicious food from
				your favourite restaurants.</p>

			<div class="feature">
				<i class="fa-solid fa-check"></i> Fast Delivery
			</div>
			<div class="feature">
				<i class="fa-solid fa-check"></i> Live Order Tracking
			</div>
			<div class="feature">
				<i class="fa-solid fa-check"></i> Secure Payments
			</div>
			<div class="feature">
				<i class="fa-solid fa-check"></i> Exclusive Offers
			</div>

		</div>

		<div class="right">

			<div class="logo">FoodieHub</div>
			<p class="subtitle">Create your account</p>

			<form id="registerForm" action="register" method="post">

				<div class="group">
					<label>Full Name</label>
					<div class="input-box">
						<i class="fa-solid fa-user"></i> <input type="text"
							name="username" placeholder="Enter your full name" required>
					</div>
				</div>

				<div class="group">
					<label>Email</label>
					<div class="input-box">
						<i class="fa-solid fa-envelope"></i> <input type="email"
							name="email" placeholder="Enter your email" required>
					</div>
				</div>

				<div class="group">
					<label>Phone Number</label>
					<div class="input-box">
						<i class="fa-solid fa-phone"></i> <input type="tel" name="phone"
							maxlength="10" pattern="[0-9]{10}"
							placeholder="Enter your phone number" required>
					</div>
				</div>

				<div class="group">
					<label>Password</label>
					<div class="input-box">
						<i class="fa-solid fa-lock"></i> <input id="password"
							type="password" name="password" placeholder="Create password"
							required> <i class="fa-solid fa-eye password-toggle"
							onclick="togglePassword('password',this)"></i>
					</div>
				</div>

				<div class="group">
					<label>Confirm Password</label>
					<div class="input-box">
						<i class="fa-solid fa-lock"></i> <input id="confirmPassword"
							type="password" name="confirmPassword"
							placeholder="Confirm password" required> <i
							class="fa-solid fa-eye password-toggle"
							onclick="togglePassword('confirmPassword',this)"></i>
					</div>
					<div class="error" id="error">Passwords do not match.</div>
				</div>

				<div class="group">
					<label>Delivery Address</label>
					<div class="input-box">
						<i class="fa-solid fa-location-dot" style="top: 22px"></i>
						<textarea name="address" placeholder="Enter your delivery address"
							required></textarea>
					</div>
				</div>

				<button type="submit">Create Account</button>

			</form>

			<div class="login">
				Already have an account? <a href="login.html">Login Here</a>
			</div>

		</div>

	</div>

	<script>
	function togglePassword(inputId, icon){

	    const input = document.getElementById(inputId);

	    if(input.type === "password"){
	        input.type = "text";
	        icon.classList.remove("fa-eye");
	        icon.classList.add("fa-eye-slash");
	    }
	    else{
	        input.type = "password";
	        icon.classList.remove("fa-eye-slash");
	        icon.classList.add("fa-eye");
	    }

	}

document.getElementById("registerForm").addEventListener("submit",function(e){
const p=document.getElementById("password").value;
const cp=document.getElementById("confirmPassword").value;
const err=document.getElementById("error");
if(p!==cp){
e.preventDefault();
err.style.display="block";
}else{
err.style.display="none";
}
});
</script>

</body>
</html>
